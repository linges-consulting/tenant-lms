services:
  gateway:
    build:
      context: ./app/gateway
    ports:
      - "80:80"
    volumes:
      - lms_videos:/mnt/videos
      - lms_images:/mnt/images
      - lms_scorm:/mnt/scorm
      - ./app/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - lms-network
    depends_on:
      - frontend
      - auth-service
      - core-service
      - notification-service

  auth-service:
    build:
      context: ./app/auth_service
    environment:
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/auth_db
      - REDIS_URL=redis://redis:6379/0
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - JWT_ROOT_SECRET=${JWT_ROOT_SECRET}
      - EXTERNAL_JWT_SECRET=${EXTERNAL_JWT_SECRET}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - ENVIRONMENT=prod
      - FRONTEND_URL=${FRONTEND_URL}
      - USE_MAILGUN=True
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN}
      - MAILGUN_BASE_URL=${MAILGUN_BASE_URL:-https://api.mailgun.net}
      - FROM_EMAIL=${FROM_EMAIL}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - lms_videos:/mnt/videos
      - lms_images:/mnt/images
      - lms_scorm:/mnt/scorm
    networks:
      - lms-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  core-service:
    build:
      context: ./app/core_service
    environment:
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/core_db
      - REDIS_URL=redis://redis:6379/0
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - JWT_ROOT_SECRET=${JWT_ROOT_SECRET}
      - EXTERNAL_JWT_SECRET=${EXTERNAL_JWT_SECRET}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:8000
      - ENVIRONMENT=prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - lms_videos:/mnt/videos
      - lms_images:/mnt/images
      - lms_scorm:/mnt/scorm
    networks:
      - lms-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: ./app/notification_service
    environment:
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/notification_db
      - REDIS_URL=redis://redis:6379/0
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - JWT_ROOT_SECRET=${JWT_ROOT_SECRET}
      - EXTERNAL_JWT_SECRET=${EXTERNAL_JWT_SECRET}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - ENVIRONMENT=prod
      - FRONTEND_URL=${FRONTEND_URL}
      - USE_MAILGUN=True
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN}
      - MAILGUN_BASE_URL=${MAILGUN_BASE_URL:-https://api.mailgun.net}
      - FROM_EMAIL=${FROM_EMAIL}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    networks:
      - lms-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      target: prod
    networks:
      - lms-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lms-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lms-network

networks:
  lms-network:
    driver: bridge

volumes:
  lms_videos:
  lms_images:
  lms_scorm:
  postgres_data:
  redis_data:
