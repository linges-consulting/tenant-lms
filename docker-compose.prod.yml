services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./app/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - lms-network
    depends_on:
      - gateway
    restart: unless-stopped

  gateway:
    build:
      context: ./app/gateway
    volumes:
      - lms_videos:/mnt/videos
      - lms_images:/mnt/images
      - lms_scorm:/mnt/scorm
    networks:
      - lms-network
    depends_on:
      - frontend
      - auth-service
      - core-service
      - notification-service
    restart: unless-stopped

  auth-service:
    build:
      context: ./app/auth_service
    environment:
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/auth_db
      - REDIS_URL=redis://redis:6379/0
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - JWT_ROOT_SECRET=${JWT_ROOT_SECRET}
      - EXTERNAL_JWT_SECRET=${EXTERNAL_JWT_SECRET}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - ENVIRONMENT=prod
      - FRONTEND_URL=${FRONTEND_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - LOGIN_MAX_ATTEMPTS=${LOGIN_MAX_ATTEMPTS:-5}
      - LOGIN_LOCKOUT_MINUTES=${LOGIN_LOCKOUT_MINUTES:-15}
      - LOGIN_FORCE_RESET_ATTEMPTS=${LOGIN_FORCE_RESET_ATTEMPTS:-10}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
    volumes:
      - lms_videos:/mnt/videos
      - lms_images:/mnt/images
      - lms_scorm:/mnt/scorm
    networks:
      - lms-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  core-service:
    build:
      context: ./app/core_service
    environment:
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/core_db
      - REDIS_URL=redis://redis:6379/0
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - JWT_ROOT_SECRET=${JWT_ROOT_SECRET}
      - EXTERNAL_JWT_SECRET=${EXTERNAL_JWT_SECRET}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:8000
      - ENVIRONMENT=prod
      - SCORM_MAX_UPLOAD_MB=${SCORM_MAX_UPLOAD_MB:-250}
    volumes:
      - lms_videos:/mnt/videos
      - lms_images:/mnt/images
      - lms_scorm:/mnt/scorm
    networks:
      - lms-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: ./app/notification_service
    environment:
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/notification_db
      - REDIS_URL=redis://redis:6379/0
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - JWT_ROOT_SECRET=${JWT_ROOT_SECRET}
      - EXTERNAL_JWT_SECRET=${EXTERNAL_JWT_SECRET}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - ENVIRONMENT=prod
      - FRONTEND_URL=${FRONTEND_URL}
      - USE_MAILGUN=True
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN}
      - MAILGUN_BASE_URL=${MAILGUN_BASE_URL:-https://api.mailgun.net}
      - MAILGUN_AUTHORIZED_RECIPIENT=${MAILGUN_AUTHORIZED_RECIPIENT}
      - FROM_EMAIL=${FROM_EMAIL}
    networks:
      - lms-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      target: prod
    networks:
      - lms-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lms-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lms-network
    restart: unless-stopped

networks:
  lms-network:
    driver: bridge

volumes:
  lms_videos:
  lms_images:
  lms_scorm:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
