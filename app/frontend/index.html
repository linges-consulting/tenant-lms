<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon_io/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
  <link rel="manifest" href="/favicon_io/site.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enterprise Learning Platform</title>
  <script>
    // Anti-FOUC: apply tenant primary color + dark/light mode before React renders
    (function () {
      try {
        // Apply dark/light mode class
        var stored = localStorage.getItem('vite-ui-theme') || 'system';
        var root = document.documentElement;
        root.classList.remove('light', 'dark');
        if (stored === 'system') {
          var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          root.classList.add(isDark ? 'dark' : 'light');
        } else {
          root.classList.add(stored);
        }

        // Apply tenant primary color
        var rawTenant = localStorage.getItem('activeTenant');
        if (rawTenant) {
          var tenant = JSON.parse(rawTenant);
          if (tenant && tenant.primary_color) {
            var hex = tenant.primary_color.replace(/^#/, '');
            var r = parseInt(hex.substring(0, 2), 16) / 255;
            var g = parseInt(hex.substring(2, 4), 16) / 255;
            var b = parseInt(hex.substring(4, 6), 16) / 255;
            var max = Math.max(r, g, b), min = Math.min(r, g, b);
            var h = 0, s = 0, l = (max + min) / 2;
            if (max !== min) {
              var d = max - min;
              s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
              if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
              else if (max === g) h = (b - r) / d + 2;
              else h = (r - g) / d + 4;
              h /= 6;
            }
            h = Math.round(h * 360);
            s = Math.round(s * 100);
            l = Math.round(l * 100);
            var formatted = h + ' ' + s + '% ' + l + '%';
            root.style.setProperty('--primary', formatted);
            root.style.setProperty('--ring', formatted);
            root.style.setProperty('--primary-foreground', l > 65 ? '222.2 47.4% 11.2%' : '210 40% 98%');
            root.style.setProperty('--accent', h + ' ' + Math.max(0, s - 20) + '% ' + Math.min(100, l + 40) + '%');
          }
        }
      } catch (e) {
        // Silently fail — React will apply the correct values after mount
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
