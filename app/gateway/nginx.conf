worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;

    client_max_body_size 260m;

    # Rate limiting zones (keyed by client IP)
    limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=auth_register:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=auth_reset:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;

    log_format debug_format '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'upstream: $upstream_addr '
                          'request_uri: $request_uri '
                          'uri: $uri';

    access_log /var/log/nginx/access.log debug_format;

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; font-src 'self';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Internal DNS resolver for Docker
        resolver 127.0.0.11 valid=30s;

        # Use variables for proxy_pass to avoid startup failure if hosts are down
        set $auth_service http://auth-service:8000;
        set $core_service http://core-service:8000;
        set $notification_service http://notification-service:8000;
        set $frontend_service http://frontend:80;

        # Service health check proxies (SysAdmin dashboard)
        location = /api/v1/health/auth {
            rewrite ^ /health break;
            proxy_pass $auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location = /api/v1/health/core {
            rewrite ^ /health break;
            proxy_pass $core_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location = /api/v1/health/notification {
            rewrite ^ /health break;
            proxy_pass $notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to Auth Service (Auth, Users, Onboarding, Tenants)
        # Rate-limited specific auth endpoints (longest-prefix wins over /api/v1/auth)
        location = /api/v1/auth/login {
            limit_req zone=auth_login burst=2 nodelay;
            limit_req_status 429;
            proxy_pass $auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /api/v1/auth/register {
            limit_req zone=auth_register burst=1 nodelay;
            limit_req_status 429;
            proxy_pass $auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /api/v1/auth/forgot-password {
            limit_req zone=auth_reset burst=1 nodelay;
            limit_req_status 429;
            proxy_pass $auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /api/v1/auth/reset-password {
            limit_req zone=auth_reset burst=1 nodelay;
            limit_req_status 429;
            proxy_pass $auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /api/v1/auth/register/complete {
            limit_req zone=auth_register burst=1 nodelay;
            limit_req_status 429;
            proxy_pass $auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Catch-all for remaining auth routes (no specific rate limit)
        location /api/v1/auth {
            proxy_pass $auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/users {
            proxy_pass $auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/onboarding {
            proxy_pass $auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/tenants {
            proxy_pass $auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/groups {
            proxy_pass $auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/assignments {
            proxy_pass $auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/user-report {
            proxy_pass $core_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to Core Service
        location /api/v1/trainings {
            proxy_pass $core_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/certificates {
            proxy_pass $core_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/progress {
            proxy_pass $core_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/dashboards {
            proxy_pass $core_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/categories {
            proxy_pass $core_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/analytics {
            proxy_pass $core_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to Notification Service
        location /api/v1/notifications {
            proxy_pass $notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Internal auth validation endpoint (called by auth_request)
        location = /internal/validate-media-access {
            internal;
            proxy_pass $auth_service/api/v1/auth/validate-media;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Authorization $http_authorization;
        }

        location /storage/videos/ {
            auth_request /internal/validate-media-access;
            alias /mnt/videos/;
            autoindex off;
            add_header Cache-Control "private, max-age=3600";
        }

        location /storage/images/ {
            auth_request /internal/validate-media-access;
            alias /mnt/images/;
            autoindex off;
            add_header Cache-Control "private, max-age=3600";
        }

        location /storage/banners/ {
            alias /mnt/images/banners/;
            autoindex off;
            add_header Cache-Control "public, max-age=86400";
            add_header X-Content-Type-Options "nosniff";
        }

        location /storage/scorm/ {
            alias /mnt/scorm/;
            autoindex off;
            add_header Cache-Control "private, no-store";
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-Content-Type-Options "nosniff";
        }

        # PDF chapter files — served inline so the viewer's <iframe> displays
        # them. SAMEORIGIN allows our viewer to embed them; nosniff prevents
        # MIME confusion.
        location /storage/pdfs/ {
            alias /mnt/images/pdfs/;
            autoindex off;
            default_type application/pdf;
            add_header Content-Disposition "inline";
            add_header Cache-Control "private, max-age=3600";
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-Content-Type-Options "nosniff";
        }

        # Cache avatars
        location /avatars/ {
            proxy_pass $frontend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Cache-Control "public, max-age=31536000";
            expires 1y;
        }

        # Route to Frontend Service
        location / {
            proxy_pass $frontend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Disable caching for dev
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;

            # WebSocket support for HMR
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
