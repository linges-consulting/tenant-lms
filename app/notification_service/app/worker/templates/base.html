<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CustomLMS{% endblock %}</title>
    <style>
        :root {
            --primary-color: {{ primary_color or '#4f46e5' }};
            --secondary-color: {{ secondary_color or '#7c3aed' }};
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            line-height: 1.6;
            color: #1f2937;
            background-color: #f9fafb;
            padding: 2.5rem 1rem;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .header {
            background: linear-gradient(135deg, {{ primary_color or '#4f46e5' }} 0%, {{ secondary_color or '#7c3aed' }} 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }
        .logo-container {
            margin-bottom: 1.5rem;
        }
        .logo-img {
            max-height: 48px;
            width: auto;
        }
        .header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }
        .header p {
            font-size: 1rem;
            opacity: 0.9;
            font-weight: 400;
        }
        .content {
            padding: 3rem 2rem;
        }
        .footer {
            background-color: #f3f4f6;
            border-top: 1px solid #e5e7eb;
            padding: 2rem;
            text-align: center;
            font-size: 0.8125rem;
            color: #6b7280;
        }
        .cta-button {
            display: inline-block;
            background: {{ primary_color or '#4f46e5' }};
            color: #ffffff !important;
            text-decoration: none;
            padding: 0.875rem 2.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        .cta-button:hover {
            opacity: 0.9;
        }
        .button-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .divider {
            height: 1px;
            background-color: #e5e7eb;
            margin: 2rem 0;
        }
        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            {% if logo_url %}
            <div class="logo-container">
                <img src="{{ logo_url }}" alt="Logo" class="logo-img">
            </div>
            {% endif %}
            <h1>{% block header_title %}CustomLMS{% endblock %}</h1>
            <p>{% block header_subtitle %}{% endblock %}</p>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            <p>&copy; {{ current_year | default('') }} {{ tenant_name or 'CustomLMS' }}. All rights reserved.</p>
            <div style="margin-top: 1rem;">
                <a href="{{ company_website | default('#') }}" style="color: {{ primary_color or '#4f46e5' }}; text-decoration: none;">Website</a> |
                <a href="{{ help_center | default('#') }}" style="color: {{ primary_color or '#4f46e5' }}; text-decoration: none;">Help Center</a>
            </div>
        </div>
    </div>
</body>
</html>
