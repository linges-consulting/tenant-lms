name: CI — Tests and Lint

on:
  pull_request:
    branches: [main]

jobs:
  test-auth:
    name: Auth Service Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: lms_user
          POSTGRES_PASSWORD: lms_pass
          POSTGRES_DB: auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r app/auth_service/requirements.txt
      - name: Run tests
        working-directory: app/auth_service
        env:
          DB_URL: postgresql://lms_user:lms_pass@localhost/auth_db
          EXTERNAL_JWT_SECRET: test-secret
          INTERNAL_JWT_SECRET: test-internal
          JWT_ROOT_SECRET: test-root
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  test-core:
    name: Core Service Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: lms_user
          POSTGRES_PASSWORD: lms_pass
          POSTGRES_DB: core_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r app/core_service/requirements.txt
      - name: Run tests
        working-directory: app/core_service
        env:
          DB_URL: postgresql://lms_user:lms_pass@localhost/core_db
          EXTERNAL_JWT_SECRET: test-secret
          INTERNAL_JWT_SECRET: test-internal
          JWT_ROOT_SECRET: test-root
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  test-notification:
    name: Notification Service Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: lms_user
          POSTGRES_PASSWORD: lms_pass
          POSTGRES_DB: notification_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r app/notification_service/requirements.txt
      - name: Run tests
        working-directory: app/notification_service
        env:
          DB_URL: postgresql://lms_user:lms_pass@localhost/notification_db
          EXTERNAL_JWT_SECRET: test-secret
          INTERNAL_JWT_SECRET: test-internal
          JWT_ROOT_SECRET: test-root
          ENVIRONMENT: test
          USE_MAILGUN: "False"
        run: pytest tests/ -v --tb=short

  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json
      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci
      - name: Lint
        working-directory: app/frontend
        run: npm run lint
